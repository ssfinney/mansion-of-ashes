name: CI and Pages

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi
          pip install pytest

      - name: Restore Tweego and SugarCube cache
        id: toolchain-cache
        uses: actions/cache@v4
        with:
          path: |
            .tools/tweego
            .storyformats/sugarcube-2
          key: toolchain-${{ runner.os }}-tweego-2.1.1-sugarcube-2.37.3

      - name: Bootstrap Tweego 2.1.1 and SugarCube 2.37.3
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          mkdir -p .tools/tweego .storyformats

          curl -fsSL -o /tmp/tweego.zip \
            https://github.com/tmedwards/tweego/releases/download/v2.1.1/tweego-2.1.1-linux-x64.zip
          python - <<'PY'
          import os
          import stat
          import zipfile

          with zipfile.ZipFile('/tmp/tweego.zip') as zf:
              with zf.open('tweego') as src, open('.tools/tweego/tweego', 'wb') as dst:
                  dst.write(src.read())

          mode = stat.S_IMODE(os.stat('.tools/tweego/tweego').st_mode)
          os.chmod('.tools/tweego/tweego', mode | 0o111)
          PY

          rm -rf .storyformats/sugarcube-2
          curl -fsSL -o /tmp/sugarcube.zip \
            https://github.com/tmedwards/sugarcube-2/releases/download/v2.37.3/sugarcube-2.37.3-for-twine-2.1-local.zip
          python - <<'PY'
          import zipfile
          from pathlib import Path

          with zipfile.ZipFile('/tmp/sugarcube.zip') as zf:
              zf.extractall(Path('.storyformats'))
          PY

      - name: Verify local toolchain contract
        run: |
          set -euo pipefail
          test -x .tools/tweego/tweego
          test -f .storyformats/sugarcube-2/format.js

      - name: Build story
        run: |
          set -euo pipefail
          bash scripts/build-story.sh

      - name: Run tests
        run: |
          set -euo pipefail
          pytest -q

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mansion-of-ashes-build
          path: build/
          if-no-files-found: error

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
